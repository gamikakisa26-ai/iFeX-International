services:
  - type: web
    name: ifex-backend
    runtime: node
    buildCommand: "cd server && npm install"
    startCommand: "cd server && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CLIENT_ORIGIN
        scope: run
        # You'll set this to your Netlify domain in the Render dashboard
